services:
  backend:
    build: .
    environment:
      SERVER_FRONTEND_URL: ${SERVER_FRONTEND_URL:-http://localhost:4000}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-replace-with-google-client-id}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-replace-with-google-client-secret}
      GOOGLE_REDIRECT_URL: ${GOOGLE_REDIRECT_URL:-http://localhost:4001/api/auth/google/callback}
      JWT_SECRET: ${JWT_SECRET:-replace-with-a-strong-random-secret}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-s3.sudarshanrajagopalan.one}
      MINIO_PUBLIC_ENDPOINT: ${MINIO_PUBLIC_ENDPOINT:-s3.sudarshanrajagopalan.one}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-replace-with-minio-access-key}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-replace-with-minio-secret-key}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-true}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
    ports:
      - "4001:4001"
    volumes:
      - ./config.yaml:/app/config.yaml
